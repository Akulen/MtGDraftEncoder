name: BaseDraftGraph
train_set:
  - BLB
  - FDN
  - TDM
temporal_split: true
time_window: 14
use_meta: false
loss: NLL
model: DraftGraph
model_params:
  - d_model: 64
    dropout_p: 0.3
    n_set_layers: 10
    n_layers: 5
    use_graph_v2: false
    lr: 1e-4
  - d_model: 64
    dropout_p: 0.3
    n_set_layers: 10
    n_layers: 5
    use_graph_v2: true
epochs: 300
batch_size: 256
optimizer: adamw
lr: 3e-4
scheduler: warmup_cosine
scheduler_params:
  init_mult: 1e-1
  warmup_steps: 25
  end_mult: 1e-2
