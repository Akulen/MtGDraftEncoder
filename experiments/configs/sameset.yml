  - model: DraftGraph2
    model_params:
      d_model: 64
      dropout_p: 0.3
      n_set_layers: 10
      n_layers: 5
  - model: DraftGraph2
    use_meta: true
    model_params:
      d_model: 64
      dropout_p: 0.3
      n_set_layers: 10
      n_layers: 5
