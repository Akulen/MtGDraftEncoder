name: SameSet
train_set:
  - BLB
  - FDN
  - TDM
  # - MOM
  # - WOE
  # - LCI
  # - MKM
  # - OTJ
  # - BLB
  # - DSK
  # - DFT
  # - TDM
  # - FIN
temporal_split: true
time_window: 14
use_meta: false
lr: 1e-4
models:
  - model: DraftTransformer2
    model_params:
      d_model: 64
      dropout_p: 0.3
      n_set_layers: 10
      n_layers: 5
  - model: DraftTransformer2
    use_meta: true
    model_params:
      d_model: 64
      dropout_p: 0.3
      n_set_layers: 10
      n_layers: 5
