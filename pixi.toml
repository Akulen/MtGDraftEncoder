[workspace]
authors = ["Akulen <tomas@rigaux.com>"]
channels = ["conda-forge"]
name = "MTGateau"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
[tasks.test-data]
    cmd = "python data.py"
    [tasks.test-data.env]
    XLA_PYTHON_CLIENT_ALLOCATOR = "platform"

[system-requirements]
cuda = "12.0"

[dependencies]
matplotlib = ">=3.10.8,<4"
equinox = ">=0.13.2,<0.14"
pytorch-gpu = ">=2.9.1,<3"
beartype = ">=0.22.6,<0.23"
polars = ">=1.35.2,<2"
requests = ">=2.32.5,<3"
optax = ">=0.2.6,<0.3"
jax = ">=0.7.2,<0.8"
jaxlib = { version = ">=0.7.2,<0.8", build = "*cuda*" }
ipython = ">=9.7.0,<10"
pynvim = ">=0.6.0,<0.7"
jupyter = ">=1.1.1,<2"
jupyterlab = ">=4.5.0,<5"
pillow = ">=12.0.0,<13"
humanfriendly = ">=10.0,<11"
nvidia-ml-py = ">=13.580.82,<14"
pyyaml = ">=6.0.3,<7"
seaborn = ">=0.13.2,<0.14"
dcor = ">=0.7,<0.8"

[pypi-dependencies]
humanhash3 = ">=0.0.6, <0.0.7"
transformers = { git = "https://github.com/huggingface/transformers", rev = "v4.56.0-Embedding-Gemma-preview" }
sentence-transformers = ">=5.1.2, <6"
pyarrow = ">=22.0.0, <23"
yfiles-jupyter-graphs = ">=1.10.9, <2"
