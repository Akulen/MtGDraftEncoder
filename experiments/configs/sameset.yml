  - model: LinearRegression
    lr: 3e-5
  - model: LinearRegression
    use_meta: true
    lr: 3e-5
epochs: 100
test_frequency: 1
graph_density: 0.01
batch_size: 256
loss: NLL
optimizer: adamw
scheduler: warmup_cosine
scheduler_params:
  init_mult: 1e-1
  warmup_steps: 1
  end_mult: 1e-1
  n_restarts: 0
  restart_factor: 1
seed:
  - 42
  - 4242
  - 424242
