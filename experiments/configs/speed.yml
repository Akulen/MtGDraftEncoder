name: Speed
train_set:
  - MOM
  - WOE
  - LCI
  - MKM
  - OTJ
  - BLB
  - DSK
  - DFT
  - TDM
  - FIN
val_set:
  - EOE
  # - ONE # /!\ Only 3 weeks of data /!\
test_set:
  - FDN
time_window: 10
# use_meta:
#   - true
#   - false
model:
  - DraftGraph
  # - LinearRegression
model_params:
  - d_model: 64
    dropout_p: 0.3
    lr: 3e-5
    scheduler_params:
      patience: 20
  # - lr: 3e-5
  #   scheduler_params:
  #     cooldown: 0
epochs: 5
optimizer: adamw
loss: NLL
batch_size: 256
scheduler_params:
  factor: 0.5
  patience: 50
  cooldown: 30
